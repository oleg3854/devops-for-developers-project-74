services:
  app:
    command: make dev
    # Здесь могут быть твои старые настройки для app, например build или environment
    environment:
      - NODE_ENV=development

  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - app